name: Feature request
description: Propose a focused improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Security/privacy considerations
      description: Mention approval, secret, gateway auth, notification, or logging implications.
