name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Logs or verification
      description: Redact secrets before posting.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have removed tokens, passwords, private device IDs, and private bootstrap URLs.
          required: true
