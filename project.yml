name: Hermes Agent iOS
options:
  bundleIdPrefix: com.tinyleed
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
packages:
  HermesAgentCore:
    path: .
targets:
  Hermes Agent iOS:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: HermesAgentCore
        product: HermesAgentCore
      - target: Hermes Agent Live Activity
      - target: Hermes Agent Share Extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyleed.hermes-agent-ios
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/HermesAgent.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  Hermes Agent iOS UI Tests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Hermes Agent iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyleed.hermes-agent-ios.ui-tests
        INFOPLIST_FILE: UITests/Info.plist
        TEST_TARGET_NAME: Hermes Agent iOS
  Hermes Agent Live Activity:
    type: app-extension
    platform: iOS
    sources:
      - LiveActivityWidget
    dependencies:
      - package: HermesAgentCore
        product: HermesAgentCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyleed.hermes-agent-ios.live-activity
        INFOPLIST_FILE: LiveActivityWidget/Info.plist
  Hermes Agent Share Extension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    dependencies:
      - package: HermesAgentCore
        product: HermesAgentCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyleed.hermes-agent-ios.share-extension
        INFOPLIST_FILE: ShareExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
